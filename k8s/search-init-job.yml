apiVersion: v1
kind: ConfigMap
metadata:
  name: search-init-scripts
data:
  es-index-mapping.json: |
    {
      "settings": {
        "index.max_ngram_diff": 18,
        "analysis": {
          "tokenizer": {
            "nori_mixed": {
              "type": "nori_tokenizer",
              "decompound_mode": "mixed"
            },
            "ngram_tokenizer": {
              "type": "ngram",
              "min_gram": 2,
              "max_gram": 10,
              "token_chars": ["letter", "digit"]
            }
          },
          "analyzer": {
            "korean": {
              "type": "custom",
              "tokenizer": "nori_mixed",
              "filter": ["lowercase", "nori_part_of_speech"]
            },
            "korean_search": {
              "type": "custom",
              "tokenizer": "nori_mixed",
              "filter": ["lowercase"]
            },
            "korean_ngram": {
              "type": "custom",
              "tokenizer": "ngram_tokenizer",
              "filter": ["lowercase"]
            }
          }
        }
      },
      "mappings": {
        "properties": {
          "type":      { "type": "keyword" },
          "companyId": { "type": "keyword" },
          "sourceId":  { "type": "keyword" },
          "title": {
            "type": "text",
            "analyzer": "korean",
            "search_analyzer": "korean_search",
            "fields": {
              "ngram": { "type": "text", "analyzer": "korean_ngram", "search_analyzer": "standard" }
            }
          },
          "content": {
            "type": "text",
            "analyzer": "korean",
            "search_analyzer": "korean_search"
          },
          "metadata": {
            "properties": {
              "empName": {
                "type": "text",
                "analyzer": "korean",
                "search_analyzer": "korean_search",
                "fields": {
                  "ngram": { "type": "text", "analyzer": "korean_ngram", "search_analyzer": "standard" }
                }
              },
              "deptName": {
                "type": "text",
                "analyzer": "korean",
                "search_analyzer": "korean_search",
                "fields": {
                  "ngram": { "type": "text", "analyzer": "korean_ngram", "search_analyzer": "standard" }
                }
              },
              "gradeName": { "type": "text", "analyzer": "korean", "search_analyzer": "korean_search" },
              "titleName": { "type": "text", "analyzer": "korean", "search_analyzer": "korean_search" },
              "docNum":    { "type": "keyword" },
              "location":  { "type": "text", "analyzer": "korean", "search_analyzer": "korean_search" },
              "empStatus":         { "type": "keyword" },
              "isUse":             { "type": "boolean" },
              "drafterId":         { "type": "long" },
              "accessibleEmpIds":  { "type": "long" },
              "ownerId":           { "type": "long" },
              "isPublic":          { "type": "boolean" },
              "isAllEmployees":    { "type": "boolean" }
            }
          },
          "createdAt": { "type": "date", "format": "date_optional_time" }
        }
      }
    }
  debezium-connector.json: |
    {
      "name": "peoplecore-mysql-connector",
      "config": {
        "connector.class": "io.debezium.connector.mysql.MySqlConnector",
        "tasks.max": "1",
        "database.hostname": "<RDS_ENDPOINT>",
        "database.port": "3306",
        "database.user": "<DB_USER>",
        "database.password": "<DB_PASSWORD>",
        "database.server.id": "184054",
        "topic.prefix": "peoplecore",
        "database.include.list": "peoplecore",
        "table.include.list": "peoplecore.employee,peoplecore.department,peoplecore.grade,peoplecore.title,peoplecore.approval_document,peoplecore.events",
        "schema.history.internal.kafka.bootstrap.servers": "kafka-service:9092",
        "schema.history.internal.kafka.topic": "schema-changes.peoplecore",
        "include.schema.changes": "false",
        "database.connectionTimeZone": "Asia/Seoul",
        "database.serverTimezone": "Asia/Seoul"
      }
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: search-init
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: curl
          image: curlimages/curl:latest
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: peoplecore-secrets
                  key: DB_HOST
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: peoplecore-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: peoplecore-secrets
                  key: DB_PASSWORD
          command: ["sh", "-c"]
          args:
            - |
              echo 'Waiting for Elasticsearch...'
              until curl -s http://elasticsearch:9200 > /dev/null; do sleep 2; done
              echo 'Creating ES index (ignore if exists)...'
              curl -s -o /dev/null -w 'ES index PUT: %{http_code}\n' \
                -X PUT http://elasticsearch:9200/unified_search \
                -H 'Content-Type: application/json' \
                -d @/scripts/es-index-mapping.json || true
              echo 'Waiting for Kafka Connect...'
              until curl -s http://kafka-connect:8083 > /dev/null; do sleep 2; done
              echo 'Rendering connector JSON with secrets...'
              sed -e "s|<RDS_ENDPOINT>|${DB_HOST}|g" \
                  -e "s|<DB_USER>|${DB_USERNAME}|g" \
                  -e "s|<DB_PASSWORD>|${DB_PASSWORD}|g" \
                  /scripts/debezium-connector.json > /tmp/debezium-connector.json
              echo 'Registering Debezium connector (ignore if exists)...'
              curl -s -o /dev/null -w 'Connector POST: %{http_code}\n' \
                -X POST http://kafka-connect:8083/connectors \
                -H 'Content-Type: application/json' \
                -d @/tmp/debezium-connector.json || true
              echo 'Search infra initialized.'
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: search-init-scripts