spring:
  config:
    activate:
      on-profile: prod

  batch:
    # 부팅 시 Job 자동 실행 차단 - 스케줄러가 JobLauncher 로 명시 호출
    job:
      enabled: false
    jdbc:
      # prod 에서는 never + 수동 DDL (schema-mysql.sql 적용 권장)
      initialize-schema: never
      isolation-level-for-create: READ_COMMITTED


  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:3306/peoplecore?useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      # 60초 이상 미반환 커넥션 발견 시 stack trace 와 함께 WARN 로그 → 누수 가시화
      leak-detection-threshold: 60000

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    open-in-view: false

  data:
    redis:
      host1: redis-1
      port1: 6379
      host2: redis-2
      port2: 6379

  kafka:
    bootstrap-servers: kafka-service:9092

    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 100

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      compression-type: gzip  #html파일을 zip으로 압축

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

eureka:
  client:
    enabled: false

logging:
  level:
    root: info

minio:
  endpoint: http://minio:9000
  #  public-url: https://minio.yourdomain.com   # 프론트 → MinIO (이미지 조회용)
  public-endpoint: https://minio.peoplecore.cloud   # 추가
  public-url: https://minio.peoplecore.cloud        # localhost → 실제 도메인으로 변경
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: approval-form

coolsms:
  api-key: ${COOLSMS_API_KEY}
  api-secret: ${COOLSMS_API_SECRET}
  from-number: "01000000000"