<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>휴가 부여 신청서</title>
<style>
  body { font-family: '맑은 고딕', 'Malgun Gothic', sans-serif; font-size: 14px; color: #000; margin: 0; padding: 20px; background: #fff; }
  .approval-document { width: 720px; margin: 0 auto; background: #fff; }
  .doc-title { text-align: center; font-size: 28px; font-weight: bold; letter-spacing: 10px; padding: 20px 0 30px 0; border-bottom: 2px solid #d1d5db; margin-bottom: 0; }
  table.form-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  table.form-table th, table.form-table td { border: 1px solid #d1d5db; padding: 8px 12px; vertical-align: middle; font-size: 14px; }
  table.form-table th { background: #f9fafb; text-align: center; font-weight: bold; width: 130px; }
  table.form-table td { background: #fff; }
  .grant-row th { background: #eaf5ef; }
  .grant-cell { text-align: center; }
  .reason-cell { height: 120px; vertical-align: top; }
  .attach-cell { min-height: 40px; color: #6b7280; font-size: 12px; }
  .notice { margin-top: 10px; font-size: 12px; color: #666; line-height: 1.6; }
  .notice ul { margin: 5px 0 0 20px; padding: 0; }
  .field-input { width: 100%; border: none; font-size: 14px; font-family: inherit; background: transparent; outline: none; }
  .field-center { text-align: center; }
  .field-label { color: #1D9E75; font-weight: bold; }
</style>
</head>
<body>

<div class="approval-document">

  <!-- 신청자 정보 -->
  <table class="form-table">
    <tr>
      <th>신 청 자</th>
      <td><input type="text" name="emp_name" class="field-input" readonly></td>
      <th>부&nbsp;&nbsp;&nbsp;&nbsp;서</th>
      <td><input type="text" name="emp_dept_name" class="field-input" readonly></td>
    </tr>
    <tr>
      <th>직&nbsp;&nbsp;&nbsp;&nbsp;급</th>
      <td><input type="text" name="emp_grade_name" class="field-input" readonly></td>
      <th>직&nbsp;&nbsp;&nbsp;&nbsp;책</th>
      <td><input type="text" name="emp_title_name" class="field-input" readonly></td>
    </tr>
    <tr>
      <th>신 청 일</th>
      <td colspan="3">
        <input type="date" name="request_date" class="field-input field-center">
      </td>
    </tr>
  </table>

  <!-- 부여 요청 정보 -->
  <table class="form-table">
    <tr class="grant-row">
      <th>휴가 종류</th>
      <td colspan="3">
        <input type="text" name="vacationTypeName" class="field-input field-center field-label" readonly>
        <!-- 실제 식별자는 hidden으로 전송 -->
        <input type="hidden" name="infoId">
      </td>
    </tr>
    <tr class="grant-row">
      <th>부여 요청 일수</th>
      <td colspan="3" class="grant-cell">
        <input type="text" name="vacReqUseDay" class="field-input field-center field-label" readonly> 일
      </td>
    </tr>
    <tr class="grant-row">
      <th>임신 주수</th>
      <td colspan="3" class="grant-cell">
        <input type="text" name="pregnancyWeeks" class="field-input field-center field-label" readonly> 주
      </td>
    </tr>
  </table>

  <!-- 사유 -->
  <table class="form-table">
    <tr>
      <th>사&nbsp;&nbsp;&nbsp;&nbsp;유</th>
      <td class="reason-cell">
        <textarea name="vacReqReason" rows="5" class="field-input" style="resize: vertical;"></textarea>
      </td>
    </tr>
  </table>

  <!-- 첨부파일 -->
  <table class="form-table">
    <tr>
      <th>첨부파일</th>
      <td class="attach-cell">※ 아래 첨부 영역에서 관리됩니다</td>
    </tr>
  </table>

  <div class="notice">
    ※ 유의사항
    <ul>
      <li>법정 근로 휴가(출산전후/유산·사산/배우자출산/가족돌봄/공가)는 증빙 자료를 반드시 첨부하세요.</li>
      <li>유산·사산 휴가는 임신 주수 기준으로 부여 일수가 자동 산정되어 입력값과 다를 수 있습니다.</li>
      <li>임신 주수 행은 유산·사산 휴가에만 해당합니다.</li>
      <li>승인 후 사용은 별도의 휴가 신청서로 진행해 주세요.</li>
    </ul>
  </div>

  <p style="text-align:center; margin-top:30px; font-size:15px;">
    위와 같이 휴가 부여를 신청합니다.
  </p>

</div>

</body>
</html>
