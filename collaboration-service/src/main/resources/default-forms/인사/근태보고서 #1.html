<table style="width: 800px; font-family: 'malgun gothic', dotum, arial, tahoma; border-collapse: collapse; border: 2px solid #d1d5db;">

</colgroup>
<tbody>
<tr>

<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">직위/성명</td>

</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">사번</td>
<td style="padding: 6px; border: 1px solid #d1d5db;"><input type="text" name="empNumber" style="width:100%;border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">연락처</td>

</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">신청일</td>
<td style="padding: 6px; border: 1px solid #d1d5db;"><input type="date" name="applyDate" style="width:100%;border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">기타</td>
<td style="padding: 6px; border: 1px solid #d1d5db;"><input type="text" name="etc" style="width:100%;border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>
</tr>
</tbody>
</table>
<br/>
<table style="width: 800px; font-family: 'malgun gothic', dotum, arial, tahoma; border-collapse: collapse; border: 2px solid #d1d5db;">

<tbody>
<tr>

</tr>
<tr>

</tr>
<tr>

</tr>
<tr>
