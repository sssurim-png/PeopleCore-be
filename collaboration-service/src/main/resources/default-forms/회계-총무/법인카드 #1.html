<table style="width: 800px; font-family: 'malgun gothic', dotum, arial, tahoma; border-collapse: collapse; border: 1px solid #d1d5db; font-size: 11pt;">
<colgroup>
<col width="150"/><col width="300"/><col width="150"/><col width="200"/>
</colgroup>
<tbody>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">신청일자</td>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">부서(팀)</td>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">직위</td>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">이름</td>
</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; text-align: center;"><input type="date" name="applyDate" style="border:0;outline:none;font-family:inherit;font-size:11pt;background:transparent;"/></td>
<td style="padding: 6px; border: 1px solid #d1d5db; text-align: center;"><input type="text" name="deptName" style="width:100%;border:0;outline:none;font-family:inherit;font-size:11pt;background:transparent;text-align:center;"/></td>
<td style="padding: 6px; border: 1px solid #d1d5db; text-align: center;"><input type="text" name="position" style="width:100%;border:0;outline:none;font-family:inherit;font-size:11pt;background:transparent;text-align:center;"/></td>
<td style="padding: 6px; border: 1px solid #d1d5db; text-align: center;"><input type="text" name="empName" style="width:100%;border:0;outline:none;font-family:inherit;font-size:11pt;background:transparent;text-align:center;"/></td>
</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">구분</td>
<td colspan="3" style="padding: 6px; border: 1px solid #d1d5db; font-weight: bold;">신청(분실) 사유</td>
</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold; vertical-align: middle;">① 신청 사유</td>
<td colspan="3" style="padding: 6px; border: 1px solid #d1d5db;"><textarea name="applyReason" rows="3" style="width:100%;border:0;outline:none;resize:vertical;font-family:inherit;font-size:11pt;background:transparent;"></textarea></td>
</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold; vertical-align: middle;">② 분실 사유</td>
<td colspan="3" style="padding: 6px; border: 1px solid #d1d5db;"><textarea name="lossReason" rows="3" style="width:100%;border:0;outline:none;resize:vertical;font-family:inherit;font-size:11pt;background:transparent;"></textarea></td>
</tr>
<tr>
<td colspan="4" style="padding: 10px; border: 1px solid #d1d5db; line-height: 1.6;">
□ 상기 본인은 위의 ①항과 같이 법인카드 발급을 신청하오니 발급하여 주시기 바랍니다. (※ 신규 발급신청의 경우)<br/>
- 신규 발급시 첨부서류 : 신분증(앞,뒤)<br/><br/>
□ 상기 본인은 위의 ②항과 같은 사유로 인하여 법인카드를 분실하였습니다.<br/>
이에 재발급을 신청하오니 발급하여 주시기 바랍니다. (※ 분실한 경우)
</td>
</tr>
<tr>
<td colspan="4" style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; font-weight: bold;">※ 관리부서 작성</td>
</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">법인카드 한도</td>
<td colspan="3" style="padding: 6px; border: 1px solid #d1d5db;"><input type="number" name="cardLimit" min="0" style="width:200px;border:0;border-bottom:1px solid #d1d5db;outline:none;font-family:inherit;font-size:11pt;background:transparent;text-align:right;"/> (백만원)</td>
</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold; vertical-align: middle;">비고사항</td>
<td colspan="3" style="padding: 6px; border: 1px solid #d1d5db;"><textarea name="adminNote" rows="2" style="width:100%;border:0;outline:none;resize:vertical;font-family:inherit;font-size:11pt;background:transparent;"></textarea></td>
</tr>
</tbody>
</table>
