<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>퇴직급여 지급결의서</title>
<style type="text/css">
table.tb_chit {
  width: 800px;
  margin-top: 1px;
  border-collapse: collapse !important;
  color: #000;
  background: #fff;
  font-size: 12px;
  border: 0;
  font-family: malgun gothic, dotum, arial, tahoma;
}
table.tb_chit table { border-collapse: collapse !important; }
table.tb_chit tr td {
  padding: 3px;
  height: 20px;
  border: 1px solid #d1d5db;
  vertical-align: middle;
}
table.tb_chit table.sign_member { border: 0; }
table.tb_chit table.sign_member tr td {
  border: 0;
  border-bottom: 1px solid #d1d5db;
}
.doc_subject {
  height: 90px !important;
  font-size: 24pt;
  font-weight: bold;
  text-align: center;
  vertical-align: middle;
  padding: 0;
  border: 0 !important;
}
.tit { background: #f9fafb; text-align: center; font-weight: bold; }
.currency { text-align: right; }
.section-title {
  background: #f9fafb;
  font-weight: bold;
  text-align: center;
  font-size: 13px;
  padding: 5px 3px;
}
.sub-title {
  font-weight: bold;
  font-size: 11px;
  padding: 4px 3px;
  border: 1px solid #d1d5db;
  background: #fff;
}

body {
  margin: 0;
  padding: 0;
  font-family: malgun gothic, dotum, arial, tahoma;
}
@media print {
  th, td { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>

<!-- ====== 본문 안내 ====== -->
<table class="tb_chit" style="margin-top:10px;">
  <tbody>
    <tr>
      <td style="border-left:0; border-right:0; border-top:0; padding:8px 4px 2px 4px; font-size:10pt;">
        ■ 퇴직금 지급과 관련하여 아래와 같이 요청합니다.
      </td>
    </tr>
    <tr>
      <td style="border:0; text-align:center; font-size:10pt; padding:2px;">- 아 래 -</td>
    </tr>
  </tbody>
</table>

<!-- ====== 지급 기본 정보 ====== -->
<table class="tb_chit" style="margin-top:4px;">
  <colgroup><col width="120px"><col width="680px"></colgroup>
  <tbody>
    <tr>
      <td class="tit">지급요청일자</td>
      <td data-key="payRequestDate" contenteditable="true"></td>
    </tr>
    <tr>
      <td class="tit">지급금액</td>
      <td data-key="totalPayAmount" contenteditable="true"></td>
    </tr>
    <tr>
      <td class="tit">지급인원</td>
      <td data-key="payHeadcount" contenteditable="true"></td>
    </tr>
    <tr>
      <td class="tit">지급내역</td>
      <td data-key="payDescription" contenteditable="true" style="height:40px; vertical-align:top;"></td>
    </tr>
  </tbody>
</table>

<!-- ====== 퇴직금 정산내역서 제목 ====== -->
<table class="tb_chit" style="margin-top:14px;">
  <tbody>
    <tr>
      <td class="section-title" style="font-size:14px; padding:6px;">퇴직금 정산내역서</td>
    </tr>
  </tbody>
</table>

<!-- ====== 사원별 퇴직금 내역 ====== -->
<table class="tb_chit" style="margin-top:10px;">
  <tbody>
  <tr><td class="sub-title" colspan="10">사원별 퇴직금 내역</td></tr>
  </tbody>
</table>
<table class="tb_chit" style="margin-top:0; width:1000px; table-layout:fixed;">
  <colgroup>
    <col width="40px">
    <col width="90px">
    <col width="80px">
    <col width="60px">
    <col width="100px">
    <col width="100px">
    <col width="115px">
    <col width="135px">
    <col width="115px">
    <col width="135px">
  </colgroup>
  <thead>
  <tr>
    <td class="tit">No</td>
    <td class="tit">부서</td>
    <td class="tit">성명</td>
    <td class="tit">유형</td>
    <td class="tit">입사일</td>
    <td class="tit">퇴사일</td>
    <td class="tit">근속</td>
    <td class="tit">퇴직금</td>
    <td class="tit">세액</td>
    <td class="tit">실지급</td>
  </tr>
  </thead>
  <tbody data-key="employeesRows">
  <!-- 백엔드 buildBatchHtml 이 사원별 <tr> 직접 주입 -->
  </tbody>
  <tfoot>
  <tr>
    <td class="tit" colspan="7" style="text-align:right;">합계</td>
    <td class="currency" style="font-weight:bold;" data-key="totalSeverance"></td>
    <td class="currency" style="font-weight:bold;" data-key="totalTaxAmount"></td>
    <td class="currency" style="font-weight:bold;" data-key="totalNetAmount"></td>
  </tr>
  </tfoot>
</table>

</body>
</html>
