<table style="width: 800px; font-family: 'malgun gothic', dotum, arial, tahoma; border-collapse: collapse; border: 1px solid #d1d5db; font-size: 9pt;">
<colgroup>
<col width="100"/><col width="300"/><col width="100"/><col width="300"/>
</colgroup>
<tbody>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">시행자</td>
<td style="padding: 6px; border: 1px solid #d1d5db;"><input type="text" name="executor" style="width:100%;border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">신청기간</td>
<td style="padding: 6px; border: 1px solid #d1d5db;">
<input type="date" name="applyStart" style="border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/> ~ <input type="date" name="applyEnd" style="border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/>
</td>
</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">부서</td>
<td style="padding: 6px; border: 1px solid #d1d5db;"><input type="text" name="deptName" style="width:100%;border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">직위</td>
<td style="padding: 6px; border: 1px solid #d1d5db;"><input type="text" name="position" style="width:100%;border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>
</tr>
</tbody>
</table>
<br/>
<table style="width: 800px; font-family: 'malgun gothic', dotum, arial, tahoma; border-collapse: collapse; border: 1px solid #d1d5db; font-size: 9pt;">
<colgroup>
<col width="100"/><col width="300"/><col width="100"/><col width="300"/>
</colgroup>
<tbody>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">조퇴날짜<br/>및 시간</td>
<td colspan="3" style="padding: 6px; border: 1px solid #d1d5db;">
From. <input type="datetime-local" name="leaveFrom" style="border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/> ~ To. <input type="datetime-local" name="leaveTo" style="border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/>
&nbsp;&nbsp;(<input type="number" name="leaveHours" min="0" step="0.5" style="width:60px;border:0;border-bottom:1px solid #d1d5db;outline:none;font-family:inherit;font-size:9pt;background:transparent;text-align:center;"/> 시간)
</td>
</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold; vertical-align: middle;">조퇴사유</td>
<td colspan="3" style="padding: 6px; border: 1px solid #d1d5db;"><textarea name="reason" rows="4" style="width:100%;border:0;outline:none;resize:vertical;font-family:inherit;font-size:9pt;background:transparent;"></textarea></td>
</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">행선지</td>
<td style="padding: 6px; border: 1px solid #d1d5db;"><input type="text" name="destination" style="width:100%;border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">긴급연락처</td>
<td style="padding: 6px; border: 1px solid #d1d5db;"><input type="text" name="emergencyContact" style="width:100%;border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>
</tr>
<tr>
<td colspan="4" style="padding: 14px; text-align: center; font-weight: bold;">상기와 같이 조퇴를 신청합니다.</td>
</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">신청일자</td>
<td colspan="3" style="padding: 6px; border: 1px solid #d1d5db;"><input type="date" name="applyDate" style="border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>
</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">신청인성명</td>
<td colspan="3" style="padding: 6px; border: 1px solid #d1d5db;"><input type="text" name="applicantName" style="width:100%;border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>
</tr>
</tbody>
</table>
