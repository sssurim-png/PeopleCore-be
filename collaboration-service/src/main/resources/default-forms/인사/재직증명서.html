<table style="width: 800px; font-family: 'malgun gothic', dotum, arial, tahoma; border-collapse: collapse; border: 1px solid #d1d5db; font-size: 9pt;">
<colgroup>
<col width="100"/><col width="100"/><col width="200"/><col width="100"/><col width="300"/>
</colgroup>
<tbody>
<tr>

<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">성 명</td>
<td style="padding: 6px; border: 1px solid #d1d5db;"><input type="text" name="empName" style="width:100%;border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>

</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">주 소</td>
<td colspan="3" style="padding: 6px; border: 1px solid #d1d5db;"><input type="text" name="address" style="width:100%;border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>
</tr>
<tr>
<td rowspan="3" style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">재직사항</td>

</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">직 위</td>
<td colspan="3" style="padding: 6px; border: 1px solid #d1d5db;"><input type="text" name="position" style="width:100%;border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>
</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">재직기간</td>
<td colspan="3" style="padding: 6px; border: 1px solid #d1d5db;">
<input type="date" name="hireStart" style="border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/> ~ <input type="date" name="hireEnd" style="border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/>
</td>
</tr>
<tr>
<td style="padding: 6px; border: 1px solid #d1d5db; background: #f9fafb; text-align: center; font-weight: bold;">발급용도</td>
<td colspan="4" style="padding: 6px; border: 1px solid #d1d5db;"><input type="text" name="issuePurpose" style="width:100%;border:0;outline:none;font-family:inherit;font-size:9pt;background:transparent;"/></td>
</tr>
<tr>
<td colspan="5" style="padding: 20px; border: 1px solid #d1d5db; text-align: center; font-size: 11pt;">

<input type="date" name="issueDate" style="border:0;outline:none;font-family:inherit;font-size:11pt;background:transparent;text-align:center;"/>

</tr>

</table>
