name: peoplecore-be

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout github
        uses: actions/checkout@v2

      # 변경 경로 감지 (face-api, elasticsearch 빌드 트리거용)
      - name: detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            face-api:
              - 'hr-service/face-module/**'
            elasticsearch:
              - 'Dockerfile.elasticsearch'

      #      k8s 설치
      - name: install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.25.9"
        id: install
      #      aws 로그인
      - name: configure aws
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_KEY}}
          aws-region: ap-northeast-2
      #     eks 업데이트
      - name: update cluster infomation
        run: aws eks update-kubeconfig --name peoplecore-cluster --region ap-northeast-2
      #     ecr 로그인
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # ============== common publish to GitHub Packages ==============
      - name: common publish (SNAPSHOT)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        working-directory: ./common
        run: |
          chmod +x ../gradlew
          ../gradlew :publish --no-daemon

      #      build && push
      # ============== apigateway ==============

      - name: apigateway build and push
        env:
          REGISTRY: 346720668840.dkr.ecr.ap-northeast-2.amazonaws.com
          REPOSITORY: peoplecore/apigateway
          IMAGE_TAG: latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          docker build \
          --secret id=gpr_user,env=GITHUB_ACTOR \
          --secret id=gpr_token,env=GITHUB_TOKEN \
          -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
          -f ./api-gateway/Dockerfile .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: apigateway kubectl apply
        #        ordersystem-deployment => deployment의 이름과 같아야 함 -> 만일 apply를 안했다면 apply가 위에 있어야함
        run: |
          kubectl apply -f ./api-gateway/k8s/depl_svc.yml
          kubectl rollout restart deployment apigateway-depl
      # ============== hr-service ==============

      - name: hr-service build and push
        env:
          REGISTRY: 346720668840.dkr.ecr.ap-northeast-2.amazonaws.com
          REPOSITORY: peoplecore/hr-service
          IMAGE_TAG: latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          docker build \
          --secret id=gpr_user,env=GITHUB_ACTOR \
          --secret id=gpr_token,env=GITHUB_TOKEN \
          -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
          -f ./hr-service/Dockerfile .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: hr-service kubectl apply
        run: |
          kubectl apply -f ./hr-service/k8s/depl_svc.yml
          kubectl rollout restart deployment hr-service-depl
      # ============== collaboration ==============

      - name: collaboration build and push
        env:
          REGISTRY: 346720668840.dkr.ecr.ap-northeast-2.amazonaws.com
          REPOSITORY: peoplecore/collaboration-service
          IMAGE_TAG: latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          docker build \
          --secret id=gpr_user,env=GITHUB_ACTOR \
          --secret id=gpr_token,env=GITHUB_TOKEN \
          -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
          -f ./collaboration-service/Dockerfile .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: collaboration-service kubectl apply
        run: |
          kubectl apply -f ./collaboration-service/k8s/depl_svc.yml
          kubectl rollout restart deployment collaboration-service-depl
      # ============== search ==============

      - name: search-service build and push
        env:
          REGISTRY: 346720668840.dkr.ecr.ap-northeast-2.amazonaws.com
          REPOSITORY: peoplecore/search-service
          IMAGE_TAG: latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          docker build \
          --secret id=gpr_user,env=GITHUB_ACTOR \
          --secret id=gpr_token,env=GITHUB_TOKEN \
          -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
          -f ./search-service/Dockerfile .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: search-service kubectl apply
        run: |
          kubectl apply -f ./search-service/k8s/depl_svc.yml
          kubectl rollout restart deployment search-service-depl

      # ============== face-api (path-trigger) ==============

      - name: face-api build and push
        if: steps.changes.outputs.face-api == 'true'
        env:
          REGISTRY: 346720668840.dkr.ecr.ap-northeast-2.amazonaws.com
          REPOSITORY: peoplecore/face-api
          IMAGE_TAG: latest
        run: |
          docker build \
          -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
          ./hr-service/face-module
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: face-api kubectl apply
        if: steps.changes.outputs.face-api == 'true'
        run: |
          kubectl apply -f ./k8s/face-api.yml
          kubectl rollout restart deployment face-api

      # ============== elasticsearch-nori (path-trigger) ==============

      - name: elasticsearch build and push
        if: steps.changes.outputs.elasticsearch == 'true'
        env:
          REGISTRY: 346720668840.dkr.ecr.ap-northeast-2.amazonaws.com
          REPOSITORY: peoplecore/elasticsearch-nori
          IMAGE_TAG: latest
        run: |
          docker build \
          -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
          -f ./Dockerfile.elasticsearch .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: elasticsearch kubectl apply
        if: steps.changes.outputs.elasticsearch == 'true'
        run: |
          kubectl apply -f ./k8s/elasticsearch.yml
          kubectl rollout restart deployment elasticsearch