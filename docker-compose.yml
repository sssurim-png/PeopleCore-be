version: '3.8'

services:
  redis1:
    image: redis:7
    container_name: redis1
    ports:
      - "6379:6379"

  redis2:
    image: redis:7
    container_name: redis2
    ports:
      - "6380:6379"

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    user: "0:0"
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9094,INTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/tmp/kraft-combined-logs

  kafka-connect:
    image: debezium/connect:3.0.0.Final
    container_name: kafka-connect
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: connect-cluster
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"


  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.elasticsearch
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"  #api포트 spring 연동용
      - "9001:9001" #console 포트
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
  #    권한 설정 (read)
  face-api:
    build:
      context: ./hr-service/face-module
      dockerfile: Dockerfile
    container_name: face-api
    ports:
      - "8001:8001"
    volumes:
      - face-chroma-data:/app/chroma_data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    volumes:
      - ./scripts/dummy/profile_images:/seed-images:ro
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing myminio/approval-form;
      /usr/bin/mc anonymous set download myminio/approval-form;
      /usr/bin/mc mb --ignore-existing myminio/peoplecore-profile;
      /usr/bin/mc anonymous set download myminio/peoplecore-profile;
      /usr/bin/mc cp --recursive /seed-images/ myminio/peoplecore-profile/seed/ || echo \"profile seed copy failed\";
      exit 0;
      "

  search-init:
    image: curlimages/curl:latest
    container_name: search-init
    depends_on:
      - elasticsearch
      - kafka-connect
    volumes:
      - ./scripts/search:/scripts
    entrypoint: >
      sh -c "
      echo 'Waiting for Elasticsearch...';
      until curl -s http://elasticsearch:9200 > /dev/null; do sleep 2; done;
      echo 'Creating ES index (ignores if exists)...';
      curl -s -o /dev/null -w 'ES index PUT: %{http_code}\n' -X PUT http://elasticsearch:9200/unified_search -H 'Content-Type: application/json' -d @/scripts/es-index-mapping.json || true;
      echo 'Waiting for Kafka Connect...';
      until curl -s http://kafka-connect:8083 > /dev/null; do sleep 2; done;
      echo 'Registering Debezium connector (ignores if exists)...';
      curl -s -o /dev/null -w 'Connector POST: %{http_code}\n' -X POST http://kafka-connect:8083/connectors -H 'Content-Type: application/json' -d @/scripts/debezium-connector.json || true;
      echo 'Search infra initialized.';
      exit 0;
      "

volumes:
  es-data:
  minio-data:
  face-chroma-data:
  kafka-data: