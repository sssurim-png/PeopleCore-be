apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway-depl
spec:
  selector:
    matchLabels:
      app: apigateway
  template:
    metadata:
      labels:
        app: apigateway
    spec:
      containers:
        - name: apigateway
          image: 346720668840.dkr.ecr.ap-northeast-2.amazonaws.com/peoplecore/apigateway:latest
#          아래 코드와 같이 rollout restart @@명령어를 써줘야 함 imagePullPolicy는 Always가 디폴트임
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: TZ
              value: Asia/Seoul
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: peoplecore-secrets
                  key: JWT_SECRET
            - name: JWT_SECRET_RT
              valueFrom:
                secretKeyRef:
                  name: peoplecore-secrets
                  key: JWT_SECRET_RT
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: peoplecore-secrets
                  key: INTERNAL_API_KEY
#           컨테이너의 자원 할당치
          resources:
            # 컨테이너가 사용할수 있는 리소스의 최대치
            limits:
              cpu: "1"
              memory: "750Mi"
            # 컨테이너가 시작될때 보장받아야 하는 최소 자원
            requests:
              cpu: "0.5"
              memory: "250Mi"
            # 컨테이너 상태 확인을 통해 롤링업데이트 최적화
          readinessProbe:
              httpGet:
                # healthcheck 경로
                path: /health
                port: 8080
              # 컨테이너 시작 후 지연
              initialDelaySeconds: 10
              # 확인 반복 주기
              periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: apigateway-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: apigateway
